<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loading... — The Mercantile</title>
  <style>
    @font-face {
      font-family: 'Biotif Pro';
      src: local('Biotif Pro'), local('BiotifPro'), local('Biotif');
      font-weight: 100 900;
      font-display: swap;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bone: #F5F5F0;
      --obsidian: #1A1A1A;
      --obsidian-muted: #999590;
      --surface: #FFFFFF;
      --detail-bg: #EEEEEE;
      --hairline: rgba(140, 126, 106, 0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Biotif Pro', 'Satoshi', 'General Sans', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bone);
      color: var(--obsidian);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Top Bar ── */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: var(--obsidian);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    .site-header a {
      color: white;
      text-decoration: none;
    }

    .brand {
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: white;
    }

    .header-icons {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-icons a {
      padding: 4px;
      display: flex;
      opacity: 0.8;
      transition: opacity 0.3s;
    }

    .header-icons a:hover { opacity: 1; }

    /* ── Layout ── */
    .product-layout {
      padding-top: 64px;
      min-height: 100vh;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .product-layout.loaded { opacity: 1; }

    @media (min-width: 1024px) {
      .product-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: calc(100vh - 64px);
      }
    }

    /* ── Left: Image ── */
    .product-image-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      padding: 32px;
    }

    @media (min-width: 1024px) {
      .product-image-panel {
        position: sticky;
        top: 64px;
        height: calc(100vh - 64px);
        padding: 48px;
      }
    }

    .product-image-wrap {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
    }

    .product-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: fadeIn 0.6s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Right: Info ── */
    .product-info-panel {
      padding: 32px 24px 48px;
      background: var(--bone);
    }

    @media (min-width: 1024px) {
      .product-info-panel {
        padding: 40px 48px 48px;
        overflow-y: auto;
      }
    }

    /* Breadcrumbs */
    .breadcrumbs {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--obsidian-muted);
      margin-bottom: 24px;
      animation: fadeUp 0.6s ease both;
    }

    .breadcrumbs a {
      color: var(--obsidian-muted);
      text-decoration: none;
      transition: color 0.3s;
    }

    .breadcrumbs a:hover { color: var(--obsidian); }

    /* Category badge */
    .category-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--obsidian-muted);
      border: 1px solid var(--hairline);
      border-radius: 100px;
      padding: 6px 14px;
      margin-bottom: 16px;
      animation: fadeUp 0.6s ease 0.05s both;
    }

    /* Title */
    .product-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      line-height: 1.15;
      color: var(--obsidian);
      animation: fadeUp 0.6s ease 0.1s both;
    }

    @media (min-width: 1024px) {
      .product-title { font-size: 36px; }
    }

    /* Price */
    .product-price {
      font-size: 20px;
      font-weight: 500;
      color: var(--obsidian);
      margin-top: 12px;
      animation: fadeUp 0.6s ease 0.15s both;
    }

    .product-price .est {
      font-size: 14px;
      font-weight: 400;
      color: var(--obsidian-muted);
    }

    /* Divider */
    .hairline {
      border: none;
      border-top: 1px solid var(--hairline);
      margin: 28px 0;
    }

    /* Description */
    .product-description {
      font-size: 15px;
      line-height: 1.8;
      color: var(--obsidian-muted);
      animation: fadeUp 0.6s ease 0.2s both;
    }

    /* Qty + Add */
    .add-section {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 28px;
      animation: fadeUp 0.6s ease 0.25s both;
    }

    .qty-selector {
      display: flex;
      align-items: center;
      border: 1px solid var(--hairline);
      border-radius: 100px;
      overflow: hidden;
    }

    .qty-selector button {
      width: 40px;
      height: 40px;
      background: transparent;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: var(--obsidian);
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }

    .qty-selector button:hover { background: var(--detail-bg); }

    .qty-selector input {
      width: 44px;
      text-align: center;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 700;
      color: var(--obsidian);
      font-family: inherit;
      outline: none;
      -moz-appearance: textfield;
    }

    .qty-selector input::-webkit-inner-spin-button,
    .qty-selector input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .btn-primary {
      flex: 1;
      height: 48px;
      background: var(--obsidian);
      color: var(--bone);
      border: none;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.3s;
      font-family: inherit;
    }

    .btn-primary:hover { opacity: 0.85; }

    /* Detail box */
    .detail-box {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 12px;
      padding: 24px;
      margin-top: 28px;
      animation: fadeUp 0.6s ease 0.3s both;
    }

    .detail-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--obsidian-muted);
      margin-bottom: 12px;
    }

    .detail-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--obsidian);
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--obsidian-muted);
      text-decoration: none;
      margin-top: 32px;
      transition: color 0.3s;
      animation: fadeUp 0.6s ease 0.35s both;
    }

    .back-link:hover { color: var(--obsidian); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--obsidian);
      color: var(--bone);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 28px;
      border-radius: 100px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 404 state */
    .not-found {
      padding-top: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    .not-found h1 {
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .not-found p {
      color: var(--obsidian-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .not-found a {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--obsidian);
      text-decoration: none;
      border-bottom: 1px solid var(--obsidian);
      padding-bottom: 2px;
      transition: opacity 0.3s;
    }

    .not-found a:hover { opacity: 0.6; }

    /* Footer */
    .footer {
      padding: 48px 24px 32px;
      background: var(--obsidian);
      text-align: center;
    }

    .footer span {
      font-size: 10px;
      color: rgba(245, 245, 240, 0.4);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <header class="site-header">
    <a href="/" class="brand">The Mercantile</a>
    <div class="header-icons">
      <a href="/departments" aria-label="Departments">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a4 4 0 018 0v2"/>
        </svg>
      </a>
      <a href="/cart" aria-label="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a1 1 0 001 .61h9.72a1 1 0 001-.76L23 6H6"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- Product Layout (populated by JS) -->
  <main id="product-page"></main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Footer -->
  <footer class="footer">
    <span>&copy; 2026 The Mercantile. All rights reserved.</span>
  </footer>

  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      const container = document.getElementById('product-page');

      if (!productId) {
        renderNotFound();
        return;
      }

      try {
        const res = await fetch('assets/items.json?v=' + Date.now());
        const rawItems = await res.json();

        // Only keep items with all required fields and a valid image path
        const items = rawItems.filter(function (item) {
          return item.id && item.name && item.price && item.image && item.category && item.description;
        });

        const product = items.find(function (item) {
          return item.id === productId;
        });

        if (!product) {
          renderNotFound();
          return;
        }

        // Verify the image actually loads before rendering
        await new Promise(function (resolve) {
          var img = new Image();
          img.onload = resolve;
          img.onerror = resolve; // still render, just with broken image
          img.src = product.image;
        });

        document.title = product.name + ' \u2014 The Mercantile';
        renderProduct(product, items);
      } catch (err) {
        renderNotFound();
      }

      function renderNotFound() {
        container.innerHTML =
          '<div class="not-found">' +
            '<h1>Product Not Found</h1>' +
            '<p>We couldn\u2019t find what you\u2019re looking for.</p>' +
            '<a href="/">Back to Home</a>' +
          '</div>';
      }

      function renderProduct(product, allItems) {
        // Find related items from same category
        var related = allItems.filter(function (item) {
          return item.category === product.category && item.id !== product.id;
        }).slice(0, 4);

        container.innerHTML =
          '<div class="product-layout" id="product-layout">' +
            '<div class="product-image-panel">' +
              '<div class="product-image-wrap">' +
                '<img src="' + escapeHtml(product.image) + '" alt="' + escapeHtml(product.name) + '" onerror="this.onerror=null;this.style.opacity=0.3;this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%23eee%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%22100%22 y=%22105%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2214%22%3EImage unavailable%3C/text%3E%3C/svg%3E\';this.style.opacity=1;" />' +
              '</div>' +
            '</div>' +
            '<div class="product-info-panel">' +
              '<nav class="breadcrumbs">' +
                '<a href="/">Home</a>' +
                '<span style="margin: 0 6px;">/</span>' +
                '<a href="/departments">' + escapeHtml(product.category).toUpperCase() + '</a>' +
                '<span style="margin: 0 6px;">/</span>' +
                '<span>' + escapeHtml(product.name) + '</span>' +
              '</nav>' +
              '<span class="category-badge">' + escapeHtml(product.category) + '</span>' +
              '<h1 class="product-title">' + escapeHtml(product.name) + '</h1>' +
              '<p class="product-price">' + escapeHtml(product.price) + ' <span class="est">est.</span></p>' +
              '<hr class="hairline" />' +
              '<p class="product-description">' + escapeHtml(product.description) + '</p>' +
              '<div class="add-section">' +
                '<div class="qty-selector">' +
                  '<button id="qty-minus">&minus;</button>' +
                  '<input type="number" id="qty-input" value="1" min="1" max="99" />' +
                  '<button id="qty-plus">+</button>' +
                '</div>' +
                '<button class="btn-primary" id="add-to-bag">Add to Bag</button>' +
              '</div>' +
              '<div class="detail-box">' +
                '<p class="detail-label">Details</p>' +
                '<p class="detail-text">' + escapeHtml(product.description) + '</p>' +
              '</div>' +
              '<a href="/" class="back-link">' +
                '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>' +
                'Back to Home' +
              '</a>' +
            '</div>' +
          '</div>';

        // Trigger layout fade-in
        requestAnimationFrame(function () {
          document.getElementById('product-layout').classList.add('loaded');
        });

        // Qty controls
        var qtyInput = document.getElementById('qty-input');

        document.getElementById('qty-minus').addEventListener('click', function () {
          var val = parseInt(qtyInput.value, 10);
          if (val > 1) qtyInput.value = val - 1;
        });

        document.getElementById('qty-plus').addEventListener('click', function () {
          var val = parseInt(qtyInput.value, 10);
          qtyInput.value = val + 1;
        });

        qtyInput.addEventListener('blur', function () {
          var val = parseInt(qtyInput.value, 10);
          if (isNaN(val) || val < 1) qtyInput.value = 1;
        });

        // Add to bag
        document.getElementById('add-to-bag').addEventListener('click', function () {
          var qty = parseInt(qtyInput.value, 10) || 1;
          showToast('Added ' + qty + ' to bag');
        });
      }

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function showToast(message) {
        var toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('visible');
        setTimeout(function () {
          toast.classList.remove('visible');
        }, 2500);
      }
    })();
  </script>
</body>
</html>
